<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOX Application Risk Calculator</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 600px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 1.6rem;
      color: #1a2e4a;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.9rem;
      color: #6b7a99;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #2d3a54;
      margin-bottom: 8px;
    }

    .multiplier-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 600;
      background: #e8f0fe;
      color: #3a5db5;
      border-radius: 4px;
      padding: 2px 7px;
      margin-left: 6px;
      vertical-align: middle;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d9e6;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #1a2e4a;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #3a5db5;
    }

    .radio-group {
      display: flex;
      gap: 12px;
    }

    .radio-option {
      flex: 1;
    }

    .radio-option input[type="radio"] {
      display: none;
    }

    .radio-option label {
      display: block;
      text-align: center;
      padding: 10px 0;
      border: 1.5px solid #d1d9e6;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      color: #4a5568;
      transition: all 0.18s;
      margin-bottom: 0;
    }

    .radio-option input[type="radio"]:checked + label {
      border-color: transparent;
      color: #ffffff;
      font-weight: 600;
    }

    /* High = red-ish */
    .radio-option.high input[type="radio"]:checked + label {
      background: #c0392b;
    }

    /* Medium = amber */
    .radio-option.medium input[type="radio"]:checked + label {
      background: #d97706;
    }

    /* Low = green */
    .radio-option.low input[type="radio"]:checked + label {
      background: #16a34a;
    }

    .radio-option label:hover {
      border-color: #3a5db5;
      background: #f0f4ff;
    }

    .radio-option input[type="radio"]:checked + label:hover {
      background: inherit;
    }

    /* Keep hover colour on selected */
    .radio-option.high input[type="radio"]:checked + label:hover { background: #c0392b; }
    .radio-option.medium input[type="radio"]:checked + label:hover { background: #d97706; }
    .radio-option.low input[type="radio"]:checked + label:hover { background: #16a34a; }

    .divider {
      border: none;
      border-top: 1.5px solid #e8edf5;
      margin: 28px 0;
    }

    .btn-calculate {
      width: 100%;
      padding: 13px;
      background: #1a2e4a;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-calculate:hover {
      background: #2e4a7a;
    }

    .result-box {
      display: none;
      margin-top: 28px;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
    }

    .result-box.low {
      background: #f0fdf4;
      border: 2px solid #86efac;
    }

    .result-box.medium {
      background: #fffbeb;
      border: 2px solid #fcd34d;
    }

    .result-box.high {
      background: #fef2f2;
      border: 2px solid #fca5a5;
    }

    .result-app {
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .result-score {
      font-size: 2.4rem;
      font-weight: 700;
      margin: 6px 0;
    }

    .result-box.low .result-score { color: #16a34a; }
    .result-box.medium .result-score { color: #d97706; }
    .result-box.high .result-score { color: #c0392b; }

    .result-label {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .result-box.low .result-label { color: #16a34a; }
    .result-box.medium .result-label { color: #d97706; }
    .result-box.high .result-label { color: #c0392b; }

    .result-breakdown {
      margin-top: 14px;
      font-size: 0.82rem;
      color: #6b7a99;
      line-height: 1.7;
    }

    .btn-reset {
      margin-top: 16px;
      background: none;
      border: 1.5px solid #d1d9e6;
      color: #4a5568;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-reset:hover {
      border-color: #3a5db5;
      color: #3a5db5;
    }

    .error-msg {
      display: none;
      color: #c0392b;
      font-size: 0.84rem;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>SOX Application Risk Calculator</h1>
      <p>Complete all fields to calculate the application's risk ranking</p>
    </div>

    <div class="form-group">
      <label for="appName">Application Name</label>
      <input type="text" id="appName" placeholder="Enter application name" />
    </div>

    <!-- Q1 -->
    <div class="form-group">
      <label>
        Proximity to Financial Statement
        <span class="multiplier-badge">× 2 weight</span>
      </label>
      <div class="radio-group">
        <div class="radio-option high">
          <input type="radio" id="q1High" name="q1" value="3" />
          <label for="q1High">High</label>
        </div>
        <div class="radio-option medium">
          <input type="radio" id="q1Medium" name="q1" value="2" />
          <label for="q1Medium">Medium</label>
        </div>
        <div class="radio-option low">
          <input type="radio" id="q1Low" name="q1" value="1" />
          <label for="q1Low">Low</label>
        </div>
      </div>
    </div>

    <!-- Q2 -->
    <div class="form-group">
      <label>Complexity of Control Environment</label>
      <div class="radio-group">
        <div class="radio-option high">
          <input type="radio" id="q2High" name="q2" value="3" />
          <label for="q2High">High</label>
        </div>
        <div class="radio-option medium">
          <input type="radio" id="q2Medium" name="q2" value="2" />
          <label for="q2Medium">Medium</label>
        </div>
        <div class="radio-option low">
          <input type="radio" id="q2Low" name="q2" value="1" />
          <label for="q2Low">Low</label>
        </div>
      </div>
    </div>

    <!-- Q3 -->
    <div class="form-group">
      <label>Control Environment Impact</label>
      <div class="radio-group">
        <div class="radio-option high">
          <input type="radio" id="q3High" name="q3" value="3" />
          <label for="q3High">High</label>
        </div>
        <div class="radio-option medium">
          <input type="radio" id="q3Medium" name="q3" value="2" />
          <label for="q3Medium">Medium</label>
        </div>
        <div class="radio-option low">
          <input type="radio" id="q3Low" name="q3" value="1" />
          <label for="q3Low">Low</label>
        </div>
      </div>
    </div>

    <hr class="divider" />

    <button class="btn-calculate" onclick="calculate()">Calculate Risk</button>
    <p class="error-msg" id="errorMsg">Please fill in the application name and select an answer for every question.</p>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      <div class="result-app" id="resultApp"></div>
      <div class="result-score" id="resultScore"></div>
      <div class="result-label" id="resultLabel"></div>
      <div class="result-breakdown" id="resultBreakdown"></div>
      <button class="btn-reset" onclick="resetForm()">Reset</button>
    </div>
  </div>

  <script>
    const VALUES = { High: 3, Medium: 2, Low: 1 };

    function getRadioValue(name) {
      const selected = document.querySelector(`input[name="${name}"]:checked`);
      return selected ? parseInt(selected.value) : null;
    }

    function getRadioLabel(name) {
      const selected = document.querySelector(`input[name="${name}"]:checked`);
      if (!selected) return '';
      return selected.value === '3' ? 'High' : selected.value === '2' ? 'Medium' : 'Low';
    }

    function calculate() {
      const appName = document.getElementById('appName').value.trim();
      const q1 = getRadioValue('q1');
      const q2 = getRadioValue('q2');
      const q3 = getRadioValue('q3');
      const errorMsg = document.getElementById('errorMsg');

      if (!appName || q1 === null || q2 === null || q3 === null) {
        errorMsg.style.display = 'block';
        return;
      }
      errorMsg.style.display = 'none';

      const score = (q1 * 2) + q2 + q3;
      let ranking, rankClass;

      if (score <= 6) {
        ranking = 'Low Risk';
        rankClass = 'low';
      } else if (score <= 8) {
        ranking = 'Medium Risk';
        rankClass = 'medium';
      } else {
        ranking = 'High Risk';
        rankClass = 'high';
      }

      const box = document.getElementById('resultBox');
      box.className = 'result-box ' + rankClass;
      box.style.display = 'block';

      document.getElementById('resultApp').textContent = appName;
      document.getElementById('resultScore').textContent = score + ' / 12';
      document.getElementById('resultLabel').textContent = ranking;
      document.getElementById('resultBreakdown').innerHTML =
        `Proximity to Financial Statement: ${getRadioLabel('q1')} (${q1} × 2 = ${q1 * 2})<br>` +
        `Complexity of Control Environment: ${getRadioLabel('q2')} (${q2})<br>` +
        `Control Environment Impact: ${getRadioLabel('q3')} (${q3})<br>` +
        `<strong>Total Score: ${score}</strong> &nbsp;|&nbsp; Threshold: ≤6 Low · 7–8 Medium · ≥9 High`;

      box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function resetForm() {
      document.getElementById('appName').value = '';
      document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
      const box = document.getElementById('resultBox');
      box.style.display = 'none';
      box.className = 'result-box';
      document.getElementById('errorMsg').style.display = 'none';
    }
  </script>
</body>
</html>
